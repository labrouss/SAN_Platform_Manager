name: Build Release Executables

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. v1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: san-platform.exe
            asset_name: san-platform-windows.exe

          - os: ubuntu-latest
            artifact: san-platform
            asset_name: san-platform-linux

          - os: macos-latest
            artifact: san-platform
            asset_name: san-platform-macos

    steps:
      # -- Checkout --------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Locate the project directory -------------------------------------------
      # Works whether main.py sits at the repo root or inside a subfolder
      # (e.g. san-web/), regardless of how the repo was structured on GitHub.
      - name: Locate project directory
        id: locate
        shell: bash
        run: |
          if [ -f "main.py" ] && [ -f "build.py" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Found project at repo root"
          elif [ -f "san-web/main.py" ]; then
            echo "dir=san-web" >> "$GITHUB_OUTPUT"
            echo "Found project at san-web/"
          else
            FOUND=$(find . -maxdepth 3 -name "main.py" -not -path "*/node_modules/*" | head -1)
            if [ -z "$FOUND" ]; then
              echo "ERROR: could not locate main.py anywhere in the repository"
              find . -maxdepth 2 -type d
              exit 1
            fi
            DIR=$(dirname "$FOUND")
            echo "dir=$DIR" >> "$GITHUB_OUTPUT"
            echo "Found project at $DIR (auto-detected)"
          fi

      # -- Python ------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # -- Linux system dependencies -------------------------------------------------
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 \
            libegl1 libopengl0 \
            xvfb

      # -- macOS system dependencies --------------------------------------------------
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install --quiet qt@5 || true

      # -- Python dependencies -----------------------------------------------------
      - name: Install Python dependencies
        working-directory: ${{ steps.locate.outputs.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5==5.15.10 PyQtWebEngine==5.15.6 requests pyinstaller

      # -- Verify imports -----------------------------------------------------------
      - name: Verify Qt imports
        working-directory: ${{ steps.locate.outputs.dir }}
        run: |
          python -c "from PyQt5.QtWebEngineWidgets import QWebEngineView; print('QWebEngineView OK')"
          python -c "from PyQt5.QtWebChannel import QWebChannel; print('QWebChannel OK')"

      # -- Build --------------------------------------------------------------------
      - name: Build executable (Linux with Xvfb)
        if: runner.os == 'Linux'
        working-directory: ${{ steps.locate.outputs.dir }}
        run: |
          xvfb-run -a python build.py --clean
        env:
          DISPLAY: ':99'

      - name: Build executable (Windows / macOS)
        if: runner.os != 'Linux'
        working-directory: ${{ steps.locate.outputs.dir }}
        run: |
          python build.py --clean

      # -- Verify output --------------------------------------------------------------
      - name: Check dist output (Unix)
        if: runner.os != 'Windows'
        run: |
          ls -lh "${{ steps.locate.outputs.dir }}/dist/"
          test -f "${{ steps.locate.outputs.dir }}/dist/${{ matrix.artifact }}"

      - name: Check dist output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $distPath = Join-Path "${{ steps.locate.outputs.dir }}" "dist"
          Get-ChildItem $distPath
          $exePath = Join-Path $distPath "${{ matrix.artifact }}"
          if (-not (Test-Path $exePath)) { exit 1 }

      # -- Upload artifact for inspection -----------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ steps.locate.outputs.dir }}/dist/${{ matrix.artifact }}
          retention-days: 7

      # -- Publish to GitHub Release (only on tag push) -----------------------------
      - name: Rename artifact for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cp "${{ steps.locate.outputs.dir }}/dist/${{ matrix.artifact }}" "${{ matrix.asset_name }}"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
          body: |
            ## SAN Management Platform ${{ github.ref_name }}

            ### Installation

            Download the executable for your platform below.

            | Platform | File |
            |---------|------|
            | Windows | `san-platform-windows.exe` |
            | Linux   | `san-platform-linux` |
            | macOS   | `san-platform-macos` |

            **First run:** default credentials are `admin / Admin1234!`

            **macOS:** if blocked by Gatekeeper, run `xattr -cr san-platform-macos`

            **Linux:** `chmod +x san-platform-linux && ./san-platform-linux`
